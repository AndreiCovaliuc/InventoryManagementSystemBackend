spring.application.name=inventory_backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${SERVER_PORT:8080}

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.example.inventory_backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.inventory_backend.security=DEBUG

# CORS Configuration
# Comma-separated list of allowed origins. Used by SecurityConfig and WebSocketConfig.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT Configuration
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:604800000}

# Ollama AI Configuration
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:llama3.1}
spring.ai.ollama.chat.options.temperature=0.7

# Encryption Configuration
app.encryption.key=${ENCRYPTION_KEY}
