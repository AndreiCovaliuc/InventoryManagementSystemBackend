spring.application.name=inventory_backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
# Kept enabled because controllers return entities with lazy relations.
# Refactor controllers to return DTOs before flipping this to false.
spring.jpa.open-in-view=true

# Server Configuration
server.port=${SERVER_PORT:8080}

# Logging Configuration
# Defaults are production-safe. Override locally via env vars (e.g. LOG_LEVEL_APP=DEBUG, LOG_LEVEL_SQL=DEBUG).
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.com.example.inventory_backend=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_PARAMS:WARN}
logging.level.com.example.inventory_backend.security=${LOG_LEVEL_SECURITY:INFO}

# CORS Configuration
# Comma-separated list of allowed origins. Used by SecurityConfig and WebSocketConfig.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT Configuration
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:604800000}

# AI Configuration (Groq via OpenAI-compatible API)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=${AI_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.chat.options.model=${AI_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.temperature=0.7

# Encryption Configuration
app.encryption.key=${ENCRYPTION_KEY}
